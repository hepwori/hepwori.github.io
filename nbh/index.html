<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <title>What neighborhood am I in?</title>
  <script src="geometry.js"></script>
  <script src="nbh.js"></script>
  <script src="sf.js"></script>
  <script src="boulder.js"></script>
  <style>
    body {
      background: black;
      color: white;
      font-family: Georgia, serif;
      margin: 0;
      padding: 40px 24px;
    }
    div {
      padding-top: 1em;
    }
    #nbh {
      font-weight: bold;
      color: white;
      font-size: 60px;
      line-height: 1.0;
    }
    #city-name {
      font-size: 22px;
      color: #888;
      font-weight: normal;
    }
    #result, #noresult, #trying, #escape, #debug {
      color: #888;
    }
    #intro {
      cursor: pointer;
    }
    #intro:hover {
      color: white;
    }
    #neighbor, #distance {
      color: white;
    }
    #noresult, #result, #escape, #debug {
      display: none;
    }

    /* dev harness */
    #dev-panel {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(0,0,0,0.85);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 12px;
      font-family: monospace;
      font-size: 12px;
      color: #aaa;
      display: none;
      z-index: 100;
    }
    #dev-panel input {
      width: 120px;
      background: #111;
      border: 1px solid #444;
      color: #fff;
      padding: 3px 6px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
    }
    #dev-panel button {
      background: #333;
      border: 1px solid #555;
      color: #ccc;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 11px;
      margin: 2px 2px 0 0;
    }
    #dev-panel button:hover { background: #555; color: #fff; }
    #dev-panel .presets { margin-top: 8px; }
  </style>
</head>
<body>

<div id="trying">Let's find out.</div>

<div id="result">
  It looks like you're in<br>
  <span id="nbh"></span>
  <br><span id="city-name"></span>
</div>

<div id="noresult"></div>

<div id="escape">
  <span id="neighbor"></span> is only <span id="distance"></span> miles away.
</div>

<div id="debug">Accuracy: <span id="accuracy"></span> meters.</div>

<div id="dev-panel">
  <div style="color:#666;margin-bottom:6px">&#x1f9ea; dev: spoof location</div>
  <input id="dev-coords" placeholder="lat, lon" style="width:210px" onpaste="handleDevPaste(event)">
  <button onclick="spoofLocation()">Go</button>
  <div class="presets">
    <button onclick="preset(37.7599,-122.4148)">Mission</button>
    <button onclick="preset(37.7930,-122.3990)">Financial District</button>
    <button onclick="preset(37.8716,-122.2727)">Berkeley</button>
    <button onclick="preset(40.0150,-105.2705)">Boulder downtown</button>
    <button onclick="preset(40.0093,-105.2931)">Chautauqua</button>
  </div>
</div>

<script>
var cities = [
  { name: 'San Francisco', neighborhoods: sfNeighborhoods },
  { name: 'Boulder',       neighborhoods: boulderNeighborhoods },
];

var watchId = null;

function show(id) { document.getElementById(id).style.display = 'block'; }
function hide(id) { document.getElementById(id).style.display = 'none'; }
function setText(id, t) { document.getElementById(id).textContent = t; }

function onPosition(pos) {
  hide('trying');
  var pt = { x: pos.coords.longitude, y: pos.coords.latitude };

  var found = findLocation(cities, pt);
  if (found) {
    setText('nbh', found.neighborhood);
    setText('city-name', found.city);
    setText('accuracy', Math.round(pos.coords.accuracy));
    hide('noresult');
    show('result');
    show('debug');
  } else {
    hide('result');
    setText('noresult', "It looks like you're not in any recognized neighborhood.");
    show('noresult');
  }

  var closest = closestLocation(cities, pt);
  if (closest) {
    var miles = Math.round(closest.miles * 10) / 10;
    setText('neighbor', closest.name + ' (' + closest.city + ')');
    setText('distance', miles);
    show('escape');
  } else {
    hide('escape');
  }
}

function onError(err) {
  hide('trying');
  var msg = 'Could not determine your location.';
  if (err.code === 1) msg = 'Location access was denied.';
  else if (err.code === 2) msg = 'Your location is currently unavailable.';
  else if (err.code === 3) msg = 'Location request timed out.';
  setText('noresult', msg);
  show('noresult');
}

function start() {
  if (!navigator.geolocation) {
    hide('trying');
    setText('noresult', 'Geolocation is not supported on this device.');
    show('noresult');
    return;
  }

  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,
    maximumAge: 30000,
    timeout: 15000,
  });
}

// Dev harness — activate with ?dev in the URL
function parseCoords(str) {
  var parts = str.split(',').map(function(s) { return parseFloat(s.trim()); });
  if (parts.length === 2 && !parts.some(isNaN)) return { lat: parts[0], lon: parts[1] };
  return null;
}

function handleDevPaste(e) {
  var text = (e.clipboardData || window.clipboardData).getData('text');
  var coords = parseCoords(text);
  if (coords) {
    e.preventDefault();
    document.getElementById('dev-coords').value = text.trim();
    onPosition({ coords: { latitude: coords.lat, longitude: coords.lon, accuracy: 1 } });
  }
}

function spoofLocation() {
  var coords = parseCoords(document.getElementById('dev-coords').value);
  if (!coords) return;
  onPosition({ coords: { latitude: coords.lat, longitude: coords.lon, accuracy: 1 } });
}

function preset(lat, lon) {
  document.getElementById('dev-coords').value = lat + ', ' + lon;
  onPosition({ coords: { latitude: lat, longitude: lon, accuracy: 1 } });
}

if (new URLSearchParams(window.location.search).has('dev')) {
  document.getElementById('dev-panel').style.display = 'block';
  hide('trying');
} else {
  start();
}
</script>

</body>
</html>
